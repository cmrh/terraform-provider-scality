# Inherit the default Gitleaks ruleset and extend with project-specific allowlist.
[extend]
useDefault = true

[allowlist]
description = "Specific placeholder credentials used in test fixtures"

# Anchored so these match only the exact fixture values, never a real secret
# that happens to contain them as a substring. No path exemptions — a real
# credential pasted into any file, test or not, is still flagged.
regexes = [
  '''^admin-ak$''',
  '''^admin-sk$''',
  '''^AKIAIOSFODNN7EXAMPLE$''',
  '''^wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY$''',
]
