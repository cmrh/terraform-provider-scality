name: Acceptance Tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acceptance:
    name: Acceptance Tests
    runs-on: self-host-cm-tf-provider
    timeout-minutes: 15
    env:
      # Single knob for the runtime binary the acceptance framework drives.
      # Swap to /usr/bin/terraform (or any other path) to validate against
      # the upstream Terraform binary without touching any other step.
      TF_ACC_TERRAFORM_PATH: /usr/bin/tofu
      TF_ACC_PROVIDER_NAMESPACE: scality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Acceptance runtime version
        run: |
          "$TF_ACC_TERRAFORM_PATH" version

      - name: Run acceptance tests
        env:
          TF_ACC: 1
          SCALITY_INSECURE_SKIP_VERIFY: "true"
          SCALITY_ENDPOINT: ${{ secrets.SCALITY_ENDPOINT }}
          SCALITY_ACCESS_KEY: ${{ secrets.SCALITY_ACCESS_KEY }}
          SCALITY_SECRET_KEY: ${{ secrets.SCALITY_SECRET_KEY }}
          SCALITY_CONSOLE_ENDPOINT: ${{ secrets.SCALITY_CONSOLE_ENDPOINT }}
          SCALITY_CONSOLE_USERNAME: ${{ secrets.SCALITY_CONSOLE_USERNAME }}
          SCALITY_CONSOLE_PASSWORD: ${{ secrets.SCALITY_CONSOLE_PASSWORD }}
        run: go test ./... -v -count 1 -timeout 10m
