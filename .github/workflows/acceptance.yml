name: Acceptance Tests

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  acceptance:
    name: Acceptance Tests
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run acceptance tests
        env:
          TF_ACC: 1
          TF_ACC_TERRAFORM_PATH: /usr/bin/tofu
          TF_ACC_PROVIDER_NAMESPACE: scality
          SCALITY_ENDPOINT: ${{ secrets.SCALITY_ENDPOINT }}
          SCALITY_ACCESS_KEY: ${{ secrets.SCALITY_ACCESS_KEY }}
          SCALITY_SECRET_KEY: ${{ secrets.SCALITY_SECRET_KEY }}
          SCALITY_CONSOLE_ENDPOINT: ${{ secrets.SCALITY_CONSOLE_ENDPOINT }}
          SCALITY_CONSOLE_USERNAME: ${{ secrets.SCALITY_CONSOLE_USERNAME }}
          SCALITY_CONSOLE_PASSWORD: ${{ secrets.SCALITY_CONSOLE_PASSWORD }}
          SCALITY_DEST_ENDPOINT: ${{ secrets.SCALITY_DEST_ENDPOINT }}
          SCALITY_DEST_ACCESS_KEY: ${{ secrets.SCALITY_DEST_ACCESS_KEY }}
          SCALITY_DEST_SECRET_KEY: ${{ secrets.SCALITY_DEST_SECRET_KEY }}
          SCALITY_DEST_CONSOLE_ENDPOINT: ${{ secrets.SCALITY_DEST_CONSOLE_ENDPOINT }}
          SCALITY_DEST_CONSOLE_USERNAME: ${{ secrets.SCALITY_DEST_CONSOLE_USERNAME }}
          SCALITY_DEST_CONSOLE_PASSWORD: ${{ secrets.SCALITY_DEST_CONSOLE_PASSWORD }}
        run: go test ./... -v -count 1 -timeout 10m
