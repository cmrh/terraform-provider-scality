name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./... -v -race

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi

  acceptance:
    name: Acceptance Tests
    needs: test
    uses: ./.github/workflows/acceptance.yml
    secrets:
      SCALITY_ENDPOINT: ${{ secrets.SCALITY_ENDPOINT }}
      SCALITY_ACCESS_KEY: ${{ secrets.SCALITY_ACCESS_KEY }}
      SCALITY_SECRET_KEY: ${{ secrets.SCALITY_SECRET_KEY }}
      SCALITY_CONSOLE_ENDPOINT: ${{ secrets.SCALITY_CONSOLE_ENDPOINT }}
      SCALITY_CONSOLE_USERNAME: ${{ secrets.SCALITY_CONSOLE_USERNAME }}
      SCALITY_CONSOLE_PASSWORD: ${{ secrets.SCALITY_CONSOLE_PASSWORD }}

  build:
    name: Build Release Binaries
    needs: [test, acceptance]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_no_v=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ steps.version.outputs.version }}
          VERSION_NO_V=${{ steps.version.outputs.version_no_v }}
          ARCHIVE_NAME=terraform-provider-scality_${VERSION_NO_V}_${{ matrix.goos }}_${{ matrix.goarch }}
          BINARY_NAME=terraform-provider-scality_${VERSION}

          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi

          go build -ldflags="-s -w -X main.version=${VERSION}" -o ${BINARY_NAME}

          zip ${ARCHIVE_NAME}.zip ${BINARY_NAME}
          rm ${BINARY_NAME}
          sha256sum ${ARCHIVE_NAME}.zip > ${ARCHIVE_NAME}.zip.sha256

      # Hand the archive + checksum to the release job as an immutable within-run
      # artifact. The release job signs what it receives here, so nothing between
      # build and sign can tamper with what gets a valid GPG signature.
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            terraform-provider-scality_*.zip
            terraform-provider-scality_*.zip.sha256
          retention-days: 1
          if-no-files-found: error

  release:
    name: Sign and Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_no_v=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Assemble manifest and checksums
        working-directory: dist
        run: |
          VERSION_NO_V=${{ steps.version.outputs.version_no_v }}

          # Provider manifest — reuse the repo-root manifest so the release asset
          # always matches the schema the registry reads from the repo.
          cp "${GITHUB_WORKSPACE}/terraform-registry-manifest.json" \
            "terraform-provider-scality_${VERSION_NO_V}_manifest.json"

          # SHA256SUMS covers every published asset (zips + manifest). Built from
          # the downloaded artifacts, not from mutable release state.
          sha256sum terraform-provider-scality_*.zip \
            "terraform-provider-scality_${VERSION_NO_V}_manifest.json" \
            > "terraform-provider-scality_${VERSION_NO_V}_SHA256SUMS"

          # Fail loudly if any downloaded artifact doesn't match its checksum.
          sha256sum -c "terraform-provider-scality_${VERSION_NO_V}_SHA256SUMS"

      - name: Import GPG key
        run: printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Sign SHA256SUMS
        working-directory: dist
        run: |
          VERSION_NO_V=${{ steps.version.outputs.version_no_v }}
          printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
            --detach-sign "terraform-provider-scality_${VERSION_NO_V}_SHA256SUMS"
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-dev') }}
          files: |
            dist/terraform-provider-scality_*.zip
            dist/terraform-provider-scality_*.zip.sha256
            dist/terraform-provider-scality_${{ steps.version.outputs.version_no_v }}_SHA256SUMS
            dist/terraform-provider-scality_${{ steps.version.outputs.version_no_v }}_SHA256SUMS.sig
            dist/terraform-provider-scality_${{ steps.version.outputs.version_no_v }}_manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
