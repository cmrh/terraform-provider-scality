name: Release

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./... -v -race

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi

  acceptance:
    name: Acceptance Tests
    needs: test
    uses: ./.github/workflows/acceptance.yml
    secrets: inherit

  build:
    name: Build Release Binaries
    needs: [test, acceptance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_no_v=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ steps.version.outputs.version }}
          VERSION_NO_V=${{ steps.version.outputs.version_no_v }}
          ARCHIVE_NAME=terraform-provider-scality_${VERSION_NO_V}_${{ matrix.goos }}_${{ matrix.goarch }}
          BINARY_NAME=terraform-provider-scality_${VERSION}

          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi

          go build -ldflags="-s -w -X main.version=${VERSION}" -o ${BINARY_NAME}

          zip ${ARCHIVE_NAME}.zip ${BINARY_NAME}
          rm ${BINARY_NAME}
          echo "ASSET=${ARCHIVE_NAME}.zip" >> $GITHUB_ENV

      - name: Generate SHA256 checksum
        run: |
          sha256sum ${{ env.ASSET }} > ${{ env.ASSET }}.sha256

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-dev') }}
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-manifest:
    name: Generate Release Manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_no_v=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Create SHA256SUMS file
        run: |
          TAG=${{ steps.version.outputs.version }}
          VERSION_NO_V=${{ steps.version.outputs.version_no_v }}

          # Download all per-archive checksums from the release
          gh release download ${TAG} --pattern "*.sha256"

          # Combine into single SHA256SUMS file (registry requires no v prefix)
          cat *.sha256 > terraform-provider-scality_${VERSION_NO_V}_SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign SHA256SUMS
        run: |
          VERSION_NO_V=${{ steps.version.outputs.version_no_v }}
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
            --detach-sign terraform-provider-scality_${VERSION_NO_V}_SHA256SUMS

      - name: Upload SHA256SUMS and signature
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            terraform-provider-scality_${{ steps.version.outputs.version_no_v }}_SHA256SUMS
            terraform-provider-scality_${{ steps.version.outputs.version_no_v }}_SHA256SUMS.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create provider manifest
        run: |
          VERSION=${{ steps.version.outputs.version_no_v }}
          cat > terraform-provider-scality_${VERSION}_manifest.json << EOF
          {
            "version": "${VERSION}",
            "protocols": ["6.0"],
            "platforms": [
              {
                "os": "linux",
                "arch": "amd64"
              },
              {
                "os": "linux",
                "arch": "arm64"
              },
              {
                "os": "darwin",
                "arch": "amd64"
              },
              {
                "os": "darwin",
                "arch": "arm64"
              },
              {
                "os": "windows",
                "arch": "amd64"
              }
            ]
          }
          EOF

      - name: Upload manifest
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: terraform-provider-scality_${{ steps.version.outputs.version_no_v }}_manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
